<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-md text-label-md">Profile</span>
</a>

<script>
        const checkboxes = document.querySelectorAll('.checkbox-custom');
        const submitBtn = document.getElementById('submitBtn');
        const countSpan = document.getElementById('selectedCount');

        checkboxes.forEach(cb => {
            cb.addEventListener('change', () => {
                const checked = Array.from(checkboxes).filter(c => c.checked);
                const count = checked.length;
                
                if (count > 0) {
                    submitBtn.disabled = false;
                    countSpan.textContent = count;
                    countSpan.classList.remove('hidden');
                } else {
                    submitBtn.disabled = true;
                    countSpan.classList.add('hidden');
                }

                // Add active visual state to the card
                const card = cb.closest('label');
                if (cb.checked) {
                    card.classList.add('border-primary', 'bg-primary-container/5');
                } else {
                    card.classList.remove('border-primary', 'bg-primary-container/5');
                }
            });
        });

        submitBtn.addEventListener('click', () => {
            if (!submitBtn.disabled) {
                submitBtn.innerHTML = `
                    <span class="animate-spin material-symbols-outlined" data-icon="progress_activity">progress_activity</span>
                    <span>Processing Applications...</span>
                `;
                setTimeout(() => {
                    alert('Applications submitted successfully!');
                    window.location.reload();
                }, 1500);
            }
        });
    </script>
